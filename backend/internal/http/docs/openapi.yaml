components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: hris_session
  schemas:
    User:
      type: object
      nullable: true
      properties:
        id:
          type: integer
          format: int64
        employee_code:
          type: string
        name:
          type: string
        email:
          type: string
        role:
          type: string
        division:
          type: string
          nullable: true
        status:
          type: string
        registered_at:
          type: string
          format: date-time
          nullable: true
        inactive_at:
          type: string
          format: date-time
          nullable: true
        last_login_at:
          type: string
          format: date-time
          nullable: true
        email_verified_at:
          type: string
          format: date-time
          nullable: true
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          maxLength: 254
        password:
          type: string
          maxLength: 128
        remember:
          type: boolean
    RegisterRequest:
      type: object
      required: [name, email, password, password_confirmation]
      properties:
        name:
          type: string
          maxLength: 120
        email:
          type: string
          format: email
          maxLength: 254
        password:
          type: string
          maxLength: 128
        password_confirmation:
          type: string
          maxLength: 128
    ResetPasswordRequest:
      type: object
      required: [token, email, password, password_confirmation]
      properties:
        token:
          type: string
          maxLength: 255
        email:
          type: string
          format: email
          maxLength: 254
        password:
          type: string
          maxLength: 128
        password_confirmation:
          type: string
          maxLength: 128
