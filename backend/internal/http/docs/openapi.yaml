openapi: 3.0.3
info:
  title: HRIS LDP API
  version: 1.0.0
  description: Dokumentasi endpoint utama HRIS LDP.
servers:
  - url: /api
tags:
  - name: Auth
  - name: Public
  - name: Profile
paths:
  /csrf:
    get:
      tags: [Auth]
      summary: Ambil CSRF token
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  csrf_token:
                    type: string
  /me:
    get:
      tags: [Auth]
      summary: Profil user saat ini
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
  /login:
    post:
      tags: [Auth]
      summary: Login akun
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login berhasil
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
                  redirect_to:
                    type: string
        '422':
          description: Validasi gagal
        '429':
          description: Terlalu banyak request
  /logout:
    post:
      tags: [Auth]
      summary: Logout akun
      responses:
        '200':
          description: Logout berhasil
  /register:
    post:
      tags: [Auth]
      summary: Registrasi pelamar
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '200':
          description: Registrasi berhasil
        '422':
          description: Validasi gagal
        '429':
          description: Terlalu banyak request
  /forgot-password:
    post:
      tags: [Auth]
      summary: Minta reset password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: Request diterima
        '429':
          description: Terlalu banyak request
  /reset-password:
    post:
      tags: [Auth]
      summary: Reset password via token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        '200':
          description: Password diperbarui
        '422':
          description: Token/validasi gagal
        '429':
          description: Terlalu banyak request
  /public/landing:
    get:
      tags: [Public]
      summary: Data landing page
      responses:
        '200':
          description: OK
  /profile:
    get:
      tags: [Profile]
      summary: Data profile page
      security:
        - cookieAuth: []
      responses:
        '200':
          description: OK
        '401':
          description: Unauthenticated
    patch:
      tags: [Profile]
      summary: Update profil dasar
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Updated
        '422':
          description: Validasi gagal
components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: hris_session
  schemas:
    User:
      type: object
      nullable: true
      properties:
        id:
          type: integer
          format: int64
        employee_code:
          type: string
        name:
          type: string
        email:
          type: string
        role:
          type: string
        division:
          type: string
          nullable: true
        status:
          type: string
        registered_at:
          type: string
          format: date-time
          nullable: true
        inactive_at:
          type: string
          format: date-time
          nullable: true
        last_login_at:
          type: string
          format: date-time
          nullable: true
        email_verified_at:
          type: string
          format: date-time
          nullable: true
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          maxLength: 254
        password:
          type: string
          maxLength: 128
        remember:
          type: boolean
    RegisterRequest:
      type: object
      required: [name, email, password, password_confirmation]
      properties:
        name:
          type: string
          maxLength: 120
        email:
          type: string
          format: email
          maxLength: 254
        password:
          type: string
          maxLength: 128
        password_confirmation:
          type: string
          maxLength: 128
    ResetPasswordRequest:
      type: object
      required: [token, email, password, password_confirmation]
      properties:
        token:
          type: string
          maxLength: 255
        email:
          type: string
          format: email
          maxLength: 254
        password:
          type: string
          maxLength: 128
        password_confirmation:
          type: string
          maxLength: 128
